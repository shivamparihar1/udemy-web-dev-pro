<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>navbar</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 25px;
        background-color: rgb(69, 68, 68);
        /* color:white; */
      }
      .nav-container {
        color: white;
        margin-bottom: 40px;
      }
      .nav1 {
        background-color: gainsboro;
        padding: 10px;
      }
      .nav1 ul {
        list-style-type: none;
        display: flex;
        justify-content: space-around;
        margin: 10px 0px 0px 0px;
        padding: 0;
      }
      .nav1 li {
        display: inline;
      }

      .nav1 button[type="login"] {
        background-color: blue;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 10px;
        cursor: pointer;
      }
      .nav1 button[type="login"]:hover {
        background-color: green;
      }

      .nav1 a {
        text-decoration: none;
        /* background-color:orange; */
        padding: 5px 10px;
        border-radius: 10px;
        color: black;
        position: relative;
      }

      .nav1 a::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 2px;
        bottom: 0;
        left: 0;
        background-color: rebeccapurple;
        transform: scaleX(0);
        transition: transform 0.3s ease-in-out;
      }
      .nav1 a:hover::after {
        transform: scaleX(1);
      }
      .nav2 {
        width: 200px;
        background-color: rgb(65, 141, 65);
        margin: 0px;
        padding: 20px;
      }
      .nav2 ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        /* border:2px solid black; */
      }
      .nav2 li {
      }
      .nav2 a {
        color: white;
        display: block;
        padding: 10px;
        width: 100%;
        text-decoration: none;
        margin-bottom: 10px;
      }
      .nav2 a:hover {
        background-color: rgb(3, 55, 3);
      }
      .nav2 .login-btn {
        background-color: green;
        width: 100%;
        padding: 7%;
        color: white;
        border: none;
      }
      .nav2 .login-btn:hover {
        background-color: rgb(11, 48, 11);
        border: 2px solid white;
        cursor: pointer;
      }

      .nav3{
        background-color: rgb(132, 196, 222);
        padding:10px;
      }
      .nav3 ul{
        list-style-type:none;
        padding:0p  x; 
        margin:0px;
        display:flex;
        justify-content:space-around;
        align-items:center;
      }
      .nav3 a{
        text-decoration:none;
        display:block;
        padding:10px;
      }
      .nav3 .dropdown-content{
        display:none;
      }
      .nav3 .dropdown:hover .dropdown-content{
        display:block;
        position:absolute;
        background-color: gray;
      
        
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="nav-container">
      <h1>Variation 1: Horizontal with underline effect</h1>
      <nav class="nav1">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Products</a></li>
          <button type="login">Login</button>
        </ul>
      </nav>
    </div>

    <div class="nav-container">
      <h1>Variation 2: Vertical with hover effect</h1>
      <nav class="nav2">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Products</a></li>
          <button class="login-btn">Login</button>
        </ul>
      </nav>
    </div>

    <div class="nav-container">
      <h1>Variation 3: Vertical with underline effect</h1>
      <nav class="nav3">
        <ul>
          <li><a href="#">Home</a></li>
          <li class="dropdown">
            <a href="#">About</a>
            <div class="dropdown-content">
              <a href="#">OurStory</a>
              <a href="#">Team</a>
              <a href="#">Contact</a>
            </div>
          </li>

          <li><a href="#">Product</a></li>
          <li><button class="lgn-btn">Login</button></li>
        </ul>
      </nav>
    </div>
  </body>
</html>
