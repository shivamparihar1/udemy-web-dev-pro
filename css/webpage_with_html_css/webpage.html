      body {

        background: linear-gradient(hsl(87, 11%, 83%));
      }
      .container {
        /* border: 1px solid black; */

      .carousel {

        height: 190px;

        margin: 0px 0px 40px 0px;
      }
      .carousel-item img {
        height: 190px;
        object-fit: cover;
        border-radius: 10px;
        
      }
      .cards {

        align-items: center;
        margin:0px 0px 20px 0px;
