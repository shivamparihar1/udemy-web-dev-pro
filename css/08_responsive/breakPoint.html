<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive design</title>
    <style>
        body{
            margin:0;
            padding:0;
            background-color: rgb(43, 43, 43);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, Helvetica, sans-serif
        }
        .responsive-div{
            background-color: rgb(82, 57, 75);
            width:100%;
            max-width:1200px;
            padding:10px;
            text-align:center;
            color:white;
            font-size:26px;
            background-color: skyblue;
        }
        @media(max-width:450px){
            body{
            align-items:flex-start;
            }
            .responsive-div{
                background-color:rgb(186, 118, 59);
            }
        } 
        @media(min-width:451px) and (max-width:600px){
            body{
            align-items:center;
            }
            .responsive-div{
                background-color:   rgb(113, 125, 21);
            }
        }
    </style>
</head>
<body>
    <div class="responsive-div"> this div changes color based on the screen size</div>
</body>
</html>
