<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login page with tailwind css</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body class="bg-gray-900 flex justify-center items-center min-h-screen">
    <div class="bg-gray-700 rounded-lg p-8 shadow-2xl">
      <h2 class="text-center text-3xl text-white mb-6 font-bold">Login</h2>

      <form>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2" for="">Email:</label>

          <input class="w-full px-3 py-2 bg-gray-600 boder-gray-700 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-white" type="email" placeholder="Email"  id="" />
        </div>

        <div class="mb-6">
          <label for="" class="block text-sm font-medium text-gray-300 mb-2">Password:</label>
          <input class="w-full px-3 py-2 bg-gray-600 boder-gray-700 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-white"  type="password" placeholder="password" id=""/>
        </div>

        <button class="w-full bg-blue-600 p-2 rounded-lg hover:bg-green-600 text-white shadow-2xl" type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
